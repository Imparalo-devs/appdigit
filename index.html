<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="script.js" defer></script>
    <script src="utils.js" defer></script>
    <script src="model.js" defer></script>
    <style>
        body {
            font-family: Georgia, serif;
        }
        #drawHere {
            background-color: #000000;
            width: 50vw;
            height: 51.6vh;
            position: absolute;
            left: 2.2vw;
            top: 18vh;
        }
        #whatIUnderstood {
            background-color: #ffffff;
            width: 43.9vw;
            height: 51.6vh;
            position: absolute;
            left: 54.4vw;
            top: 18vh;
        }
        #clearBtn {
            background-color: #ffffff;
            width: 17.8vw;
            height: 7.4vh;
            position: absolute;
            left: 78.3vw;
            top: 72.1vh;
        }
        #recognizeBtn {
            background-color: #ffffff;
            width: 17.8vw;
            height: 7.4vh;
            position: absolute;
            left: 57.2vw;
            top: 72.1vh;
        }
        #confidenceScore {
            font-size: 28px;
        }
        #predictedDigit {
            font-size: 57px;
        }
    </style>
</head>
<body>
    <canvas id="drawingCanvas" width="300" height="300"></canvas>
    <div id="drawHere">
        <label id="drawLabel" style="font-size: 52px;">Draw your number here</label>
    </div>
    <div id="whatIUnderstood">
        <label id="whatILabel" style="font-size: 28px;">What I understood</label>
        <label id="predictedDigit" style="font-size: 57px;">N/A</label>
        <label id="confidenceScore" style="font-size: 28px;">Confidence score -> 0</label>
    </div>
    <button id="clearBtn" onclick="clearAll()">Clear</button>
    <button id="recognizeBtn" onclick="recognizeDraw()">Recognize</button>
    <label id="demoLabel" style="font-size: 51px; border-radius: 14px;">Demo Digit Recognizer</label>
</body>
</html>
