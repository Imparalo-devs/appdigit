<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>
    <div id="drawHere" class="container">
        <canvas id="drawingCanvas" width="300" height="300"></canvas>
        <label id="drawLabel">Draw your number here</label>
    </div>
    <div id="whatIUnderstood" class="container">
        <label id="predictedDigitLabel">Your number is N/A</label>
        <label id="confidenceScoreLabel">Confidence score -> 0</label>
        <label id="whatIUnderstoodLabel">What I understood</label>
    </div>
    <button id="clearBtn" onclick="clearAll(event)">Clear</button>
    <button id="recognizeBtn" onclick="recognizeDraw(event)">Recognize</button>
    <script src="script.js"></script>
</body>
</html>
