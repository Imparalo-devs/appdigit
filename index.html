<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="drawHere" style="background-color: #000000; position: absolute; left: 2.2%; top: 18.0%; width: 50.0%; height: 51.6%;">
        <canvas id="drawingCanvas" width="300" height="300"></canvas>
    </div>
    <div id="whatIUnderstood" style="background-color: #ffffff; position: absolute; left: 54.4%; top: 18.0%; width: 43.9%; height: 51.6%;">
        <label id="predictedDigit" style="font-size: 57px;">—</label>
        <label id="confidenceScore" style="font-size: 28px;">—</label>
        <label style="font-size: 28px;">What I understood</label>
    </div>
    <label style="font-size: 51px; font-family: Georgia, serif; border-radius: 14px; background-color: #ffffff; position: absolute; left: 2.2%; top: 4.9%; width: 96.1%; height: 6.7%;">Demo Digit Recognizer</label>
    <button id="clearBtn" style="background-color: #ffffff; position: absolute; left: 78.3%; top: 72.1%; width: 17.8%; height: 7.4%;" onclick="clearAll(event)">Clear</button>
    <button id="recognizeBtn" style="background-color: #ffffff; position: absolute; left: 57.2%; top: 72.1%; width: 17.8%; height: 7.4%;" onclick="recognizeDraw(event)">Recognize</button>
    <label style="font-size: 52px; background-color: #ffffff; position: absolute; left: 5.6%; top: 73.0%; width: 43.3%; height: 6.6%;">Draw your number here</label>
    <label style="font-size: 28px; background-color: #ffffff; position: absolute; left: 65.0%; top: 50.0%; width: 21.7%; height: 4.7%;">Confidence score -> 0</label>
    <label style="font-size: 57px; background-color: #ffffff; position: absolute; left: 56.1%; top: 32.8%; width: 40.6%; height: 12.0%;">Your number is N/A</label>
    <script src="script.js"></script>
</body>
</html>
