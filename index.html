<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
        }
        #drawHere {
            background-color: #000000;
            width: 50vw;
            height: 51.6vh;
            position: absolute;
            left: 2.2vw;
            top: 18vh;
        }
        #whatIUnderstood {
            background-color: #ffffff;
            width: 43.9vw;
            height: 51.6vh;
            position: absolute;
            left: 54.4vw;
            top: 18vh;
        }
        #clearBtn {
            background-color: #ffffff;
            width: 17.8vw;
            height: 7.4vh;
            position: absolute;
            left: 78.3vw;
            top: 72.1vh;
        }
        #recognizeBtn {
            background-color: #ffffff;
            width: 17.8vw;
            height: 7.4vh;
            position: absolute;
            left: 57.2vw;
            top: 72.1vh;
        }
        #confidenceScore {
            font-size: 28px;
        }
        #predictedDigit {
            font-size: 57px;
        }
    </style>
</head>
<body>
    <h1 id="demoDigitRecognizer" style="font-size: 51px; font-family: Georgia, serif; border-radius: 14px; background-color: #ffffff; width: 96.1vw; height: 6.7vh; position: absolute; left: 2.2vw; top: 4.9vh;">Demo Digit Recognizer</h1>
    <div id="drawHere">
        <canvas id="drawingCanvas" width="300" height="300"></canvas>
        <p id="drawYourNumberHere" style="font-size: 52px; background-color: #ffffff; width: 43.3vw; height: 6.6vh; position: absolute; left: 5.6vw; top: 73vh;">Draw your number here</p>
    </div>
    <div id="whatIUnderstood">
        <p id="whatIUnderstoodLabel" style="font-size: 28px; background-color: #ffffff; width: 18.7vw; height: 4.3vh; position: absolute; left: 66.1vw; top: 23vh;">What I understood</p>
        <p id="predictedDigit" style="font-size: 57px; background-color: #ffffff; width: 40.6vw; height: 12vh; position: absolute; left: 56.1vw; top: 32.8vh;">N/A</p>
        <p id="confidenceScore" style="font-size: 28px; background-color: #ffffff; width: 21.7vw; height: 4.7vh; position: absolute; left: 65vw; top: 50vh;">Confidence score -> 0</p>
    </div>
    <button id="clearBtn" onclick="clearAll()">Clear</button>
    <button id="recognizeBtn" onclick="recognizeDraw()">Recognize</button>
    <script src="script.js"></script>
</body>
</html>
