<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <style>
        body {
            font-family: Georgia, serif;
        }
        #drawHere {
            background-color: #000000;
            border-radius: 14px;
        }
        #whatIUnderstood {
            background-color: #ffffff;
        }
        #clearBtn, #recognizeBtn {
            background-color: #ffffff;
            border-radius: 14px;
        }
    </style>
</head>
<body>
    <h1 id="demoDigitRecognizer" style="font-size: 51px; background-color: #ffffff; border-radius: 14px;">Demo Digit Recognizer</h1>
    <div id="drawHere" style="position: absolute; left: 2.2%; top: 18.0%; width: 50.0%; height: 51.6%;">
        <canvas id="drawingCanvas" width="300" height="300"></canvas>
    </div>
    <div id="whatIUnderstood" style="position: absolute; left: 54.4%; top: 18.0%; width: 43.9%; height: 51.6%;">
        <p id="whatIUnderstoodLabel" style="font-size: 28px;">What I understood</p>
        <p id="predictedDigit" style="font-size: 57px;">—</p>
        <p id="confidenceScore" style="font-size: 28px;">Confidence score -> —</p>
    </div>
    <button id="clearBtn" style="position: absolute; left: 78.3%; top: 72.1%; width: 17.8%; height: 7.4%; background-color: #ffffff; border-radius: 14px;" onclick="clearAll(event)">Clear</button>
    <button id="recognizeBtn" style="position: absolute; left: 57.2%; top: 72.1%; width: 17.8%; height: 7.4%; background-color: #ffffff; border-radius: 14px;" onclick="recognizeDraw(event)">Recognize</button>
    <p id="drawLabel" style="position: absolute; left: 5.6%; top: 73.0%; width: 43.3%; height: 6.6%; font-size: 52px; background-color: #ffffff;">Draw your number here</p>
    <script src="script.js"></script>
    <script src="model.js"></script>
    <script src="utils.js"></script>
</body>
</html>
