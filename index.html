<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>
    <div id="drawHere" class="container"></div>
    <label id="demoDigitRecognizer" class="label">Demo Digit Recognizer</label>
    <div id="whatIUnderstood" class="container"></div>
    <button id="clearBtn" class="button" onclick="clearAll(event)">Clear</button>
    <button id="recognizeBtn" class="button" onclick="recognizeDraw(event)">Recognize</button>
    <label id="confidenceScore" class="label">Confidence score -> 0</label>
    <label id="predictedDigit" class="label">Your number is N/A</label>
    <label id="drawLabel" class="label">Draw your number here</label>
    <label id="whatILabel" class="label">What I understood</label>
    <canvas id="drawingCanvas" width="300" height="300"></canvas>
    <script>
        let model;
        let loading = true;
        let drawingCanvas = document.getElementById('drawingCanvas');
        let ctx = drawingCanvas.getContext('2d');
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 12;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        let isDrawing = false;
        let lastX, lastY;
        
        async function loadModel() {
            try {
                model = await tf.loadLayersModel('/tfjs_model/model.json');
                loading = false;
            } catch (error) {
                console.error('Error loading model:', error);
            }
        }
        
        function clearAll(event) {
            ctx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
            document.getElementById('predictedDigit').textContent = '—';
            document.getElementById('confidenceScore').textContent = '—';
        }
        
        async function recognizeDraw(event) {
            if (loading) return;
            if (!model) {
                console.error('Model is not loaded');
                return;
            }
            try {
                const canvas = document.createElement('canvas');
                canvas.width = 28;
                canvas.height = 28;
                const ctx2 = canvas.getContext('2d');
                ctx2.drawImage(drawingCanvas, 0, 0, 28, 28);
                const imageData = ctx2.getImageData(0, 0, 28, 28);
                const data = new Uint8Array(28 * 28);
                for (let i = 0; i < 28 * 28; i++) {
                    data[i] = imageData.data[i * 4];
                }
                const tensor = tf.tensor4d(data, [1, 28, 28, 1]);
                tensor = tf.cast(tensor, 'float32');
                tensor = tf.div(tensor, 255);
                const prediction = await model.predict(tensor);
                const probabilities = await prediction.data();
                const maxProb = Math.max(...probabilities);
                const digit = probabilities.indexOf(maxProb);
                const confidence = (maxProb * 100).toFixed(1) + '%';
                document.getElementById('predictedDigit').textContent = digit.toString();
                document.getElementById('confidenceScore').textContent = confidence;
            } catch (error) {
                console.error('Error recognizing draw:', error);
            }
        }
        
        drawingCanvas.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            lastX = e.clientX - drawingCanvas.getBoundingClientRect().left;
            lastY = e.clientY - drawingCanvas.getBoundingClientRect().top;
        });
        
        drawingCanvas.addEventListener('pointermove', (e) => {
            if (isDrawing) {
                const x = e.clientX - drawingCanvas.getBoundingClientRect().left;
                const y = e.clientY - drawingCanvas.getBoundingClientRect().top;
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
                lastX = x;
                lastY = y;
            }
        });
        
        drawingCanvas.addEventListener('pointerup', () => {
            isDrawing = false;
        });
        
        loadModel();
    </script>
</body>
</html>
