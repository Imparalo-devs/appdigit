<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Digit Recognizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>
    <div style="background-color: #deddda; width: 100%; height: 100vh; position: relative;">
        <label id="demo-digit-recognizer" style="position: absolute; left: 2.2%; top: 4.8%; width: 96.1%; height: 6.6%; font-size: 51px; font-family: Georgia, serif; border-radius: 14px;">Demo Digit Recognizer</label>
        <div id="what-i-understood" style="position: absolute; left: 54.4%; top: 17.7%; width: 43.9%; height: 50.8%;">
            <label id="what-i-understood-label" style="position: absolute; left: 0%; top: 0%; width: 100%; height: 8.3%; font-size: 28px;">What I understood</label>
            <label id="your-number-is" style="position: absolute; left: 0%; top: 20%; width: 100%; height: 23.4%; font-size: 57px;">Your number is N/A</label>
            <label id="confidence-score" style="position: absolute; left: 0%; top: 55%; width: 100%; height: 9.2%; font-size: 28px;">Confidence score -> 0</label>
        </div>
        <canvas id="drawHere" style="position: absolute; left: 2.2%; top: 16.9%; width: 49.4%; height: 52.4%; background-color: #000000; border: none;" width="712" height="520"></canvas>
        <label id="draw-your-number-here" style="position: absolute; left: 5.6%; top: 71.8%; width: 43.3%; height: 7.7%; font-size: 52px; font-family: 'Helvetica Neue', sans-serif;">Draw your number here</label>
        <button id="clear" style="position: absolute; left: 78.3%; top: 71.8%; width: 17.8%; height: 8.1%; background-color: #62a0ea; border: none; color: #ffffff;" onclick="clearAll(event)">Clear</button>
        <button id="recognize" style="position: absolute; left: 57.2%; top: 71.8%; width: 17.8%; height: 7.7%; background-color: #26a269; border: none; color: #ffffff;" onclick="recognizeDraw(event)">Recognize</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
