<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="drawHere" style="left: 2.2%; top: 18.0%; width: 50.0%; height: 51.6%; background-color: #000000;">
        <canvas id="drawingCanvas" width="300" height="300"></canvas>
        <label id="drawLabel" style="font-size: 52px;">Draw your number here</label>
    </div>
    <div class="container" id="whatIUnderstood" style="left: 54.4%; top: 18.0%; width: 43.9%; height: 51.6%; background-color: #ffffff;">
        <label id="demoLabel" style="font-size: 51px; font-family: Georgia, serif; border-radius: 14px;">Demo Digit Recognizer</label>
        <label id="whatILabel" style="font-size: 28px;">What I understood</label>
        <label id="predictedDigit" style="font-size: 57px;">Your number is N/A</label>
        <label id="confidenceScore" style="font-size: 28px;">Confidence score -> 0</label>
    </div>
    <button id="clearBtn" onclick="clearAll(event)" style="left: 78.3%; top: 72.1%; width: 17.8%; height: 7.4%; background-color: #ffffff;">Clear</button>
    <button id="recognizeBtn" onclick="recognizeDraw(event)" style="left: 57.2%; top: 72.1%; width: 17.8%; height: 7.4%; background-color: #ffffff;">Recognize</button>
    <script src="script.js"></script>
</body>
</html>
