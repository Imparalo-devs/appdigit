<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Digit Recognizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>
    <label id="demoLabel" class="demoLabel">Demo Digit Recognizer</label>
    <div id="whatIUnderstood" class="whatIUnderstood">
        <label id="whatIUnderstoodLabel" class="whatIUnderstoodLabel">What I understood</label>
        <label id="confidenceScoreLabel" class="confidenceScoreLabel">Confidence score -> 0</label>
        <label id="predictedDigitLabel" class="predictedDigitLabel">Your number is N/A</label>
    </div>
    <canvas id="drawHere" class="drawHere"></canvas>
    <label id="drawLabel" class="drawLabel">Draw your number here</label>
    <button id="clearBtn" class="clearBtn" onclick="clearAll(event)">Clear</button>
    <button id="recognizeBtn" class="recognizeBtn" onclick="recognizeDraw(event)">Recognize</button>
    <script src="script.js"></script>
</body>
</html>
