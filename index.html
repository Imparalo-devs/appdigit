<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
</head>
<body>
    <div id="Demo Digit Recognizer" class="demo-digit-recognizer">Demo Digit Recognizer</div>
    <div id="whatIUnderstood" class="what-i-understood">
        <div id="What I understood" class="what-i-understood-label">What I understood</div>
        <div id="Your number is N/A" class="your-number-is-na">Your number is N/A</div>
        <div id="Confidence score -> 0" class="confidence-score">Confidence score -> 0</div>
    </div>
    <canvas id="drawHere" class="draw-here" width="712" height="520"></canvas>
    <div id="Draw your number here" class="draw-your-number-here">Draw your number here</div>
    <button id="Clear" class="clear-button" onclick="clearAll(event)">Clear</button>
    <button id="Recognize" class="recognize-button" onclick="recognizeDraw(event)">Recognize</button>
    <script type="module" src="script.js"></script>
</body>
</html>
