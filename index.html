<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="drawHere" style="position: absolute; left: 2.2%; top: 18.0%; width: 50.0%; height: 51.6%; background-color: #000000;">
        <canvas id="drawingCanvas" width="300" height="300"></canvas>
        <label id="drawLabel" style="position: absolute; left: 5.6%; top: 73.0%; width: 43.3%; height: 6.6%; background-color: #ffffff; font-size: 52px;">Draw your number here</label>
    </div>
    <div id="whatIUnderstood" style="position: absolute; left: 54.4%; top: 18.0%; width: 43.9%; height: 51.6%; background-color: #ffffff;">
        <label id="demoLabel" style="position: absolute; left: 0%; top: 0%; width: 100%; height: 6.7%; background-color: #ffffff; font-size: 51px; font-family: Georgia, serif; border-radius: 14px;">Demo Digit Recognizer</label>
        <label id="whatILabel" style="position: absolute; left: 0%; top: 10%; width: 100%; height: 4.3%; background-color: #ffffff; font-size: 28px;">What I understood</label>
        <label id="predictedDigit" style="position: absolute; left: 0%; top: 30%; width: 100%; height: 12.0%; background-color: #ffffff; font-size: 57px;">Your number is N/A</label>
        <label id="confidenceScore" style="position: absolute; left: 0%; top: 50%; width: 100%; height: 4.7%; background-color: #ffffff; font-size: 28px;">Confidence score -> 0</label>
    </div>
    <button id="clearBtn" style="position: absolute; left: 78.3%; top: 72.1%; width: 17.8%; height: 7.4%; background-color: #ffffff;" onclick="clearAll(event)">Clear</button>
    <button id="recognizeBtn" style="position: absolute; left: 57.2%; top: 72.1%; width: 17.8%; height: 7.4%; background-color: #ffffff;" onclick="recognizeDraw(event)">Recognize</button>
    <script src="script.js"></script>
</body>
</html>
